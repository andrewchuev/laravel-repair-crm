name: Rollback production

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Commit SHA to roll back to
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  rollback:
    name: Roll back production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote rollback
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -eu
          ssh -i ~/.ssh/id_ed25519 \
            -p "${PROD_PORT}" \
            "${PROD_USER}@${PROD_HOST}" \
            "TARGET_SHA='${TARGET_SHA}' REPO_DIR='/opt/sites/crm.reslab.pro' bash /opt/sites/crm.reslab.pro/deploy/rollback-prod.sh"
