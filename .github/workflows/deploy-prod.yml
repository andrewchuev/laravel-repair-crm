name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s
  ' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s
  ' "$PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -eu
          ssh -i ~/.ssh/id_ed25519             -p "${PROD_PORT}"             "${PROD_USER}@${PROD_HOST}"             "DEPLOY_SHA='${DEPLOY_SHA}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' REPO_DIR='/opt/sites/crm.reslab.pro' bash /opt/sites/crm.reslab.pro/deploy/deploy-prod.sh"
